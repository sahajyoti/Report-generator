<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FieldPro Reports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"
      defer
    ></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <header class="app-header">
      <div>
        <p class="eyebrow">Technician Toolkit</p>
        <h1>FieldPro Reports</h1>
      </div>
      <button id="newReportTopBtn" class="btn btn-primary">Create New Report</button>
    </header>

    <main class="app-main">
      <section class="dashboard" id="dashboard">
        <article class="card metric">
          <p>Today Reports</p>
          <h2 id="todayCount">0</h2>
        </article>
        <article class="card metric">
          <p>Total Customers</p>
          <h2 id="customerCount">0</h2>
        </article>
        <article class="card metric">
          <p>Total Invoices</p>
          <h2 id="invoiceCount">0</h2>
        </article>
      </section>

      <section class="card quick-actions">
        <h3>Quick Actions</h3>
        <div class="button-row">
          <button id="newReportBtn" class="btn btn-primary">Create New Report</button>
          <button id="historyBtn" class="btn btn-secondary">View History</button>
        </div>
      </section>

      <section id="wizardSection" class="card hidden">
        <div class="wizard-header">
          <h3>Create Report</h3>
          <p id="stepLabel">Step 1 of 5</p>
        </div>

        <div class="step" data-step="1">
          <label>Choose Existing Customer</label>
          <select id="customerSelect">
            <option value="">Select customer</option>
          </select>

          <p class="muted">or add a new customer</p>

          <label>Customer Name</label>
          <input id="customerName" type="text" placeholder="Rahul Sharma" />

          <label>Phone</label>
          <input id="customerPhone" type="tel" placeholder="9876543210" />

          <label>Address (optional)</label>
          <textarea id="customerAddress" rows="2" placeholder="Area, City"></textarea>
        </div>

        <div class="step hidden" data-step="2">
          <label>Service Type</label>
          <select id="serviceType">
            <option>AC Repair</option>
            <option>Electrical Work</option>
            <option>Biomedical Device Service</option>
            <option>Plumbing</option>
            <option>General Maintenance</option>
          </select>

          <label>Problem Reported</label>
          <textarea id="problem" rows="2" placeholder="No cooling / device not starting"></textarea>

          <label>Work Done</label>
          <textarea id="workDone" rows="2" placeholder="Replaced capacitor, cleaned filter"></textarea>

          <label>Technician Name</label>
          <input id="technicianName" type="text" placeholder="Your name" />
        </div>

        <div class="step hidden" data-step="3">
          <label>Parts Used</label>
          <div id="partsList"></div>
          <button id="addPartBtn" class="btn btn-ghost" type="button">+ Add Part</button>

          <label>Service Charge</label>
          <input id="serviceCharge" type="number" min="0" placeholder="500" />

          <label>Additional Notes (optional)</label>
          <textarea id="notes" rows="2" placeholder="Next service after 3 months"></textarea>
        </div>

        <div class="step hidden" data-step="4">
          <div class="inline">
            <label class="check-inline">
              <input id="gstEnabled" type="checkbox" />
              Include GST
            </label>
            <input id="gstPercent" type="number" value="18" min="0" max="28" />
          </div>

          <div class="totals card soft">
            <div>
              <span>Subtotal</span>
              <strong id="subtotal">0</strong>
            </div>
            <div>
              <span>GST</span>
              <strong id="gstAmount">0</strong>
            </div>
            <div>
              <span>Total</span>
              <strong id="totalAmount">0</strong>
            </div>
          </div>

          <p class="muted">Invoice number and date are auto-generated.</p>
        </div>

        <div class="step hidden" data-step="5">
          <label>Client Signature</label>
          <canvas id="signaturePad" width="500" height="180"></canvas>
          <div class="button-row">
            <button id="clearSignBtn" class="btn btn-ghost" type="button">Clear Signature</button>
          </div>

          <div class="button-row mt">
            <button id="saveReportBtn" class="btn btn-primary" type="button">Save & Generate</button>
          </div>
        </div>

        <div class="wizard-nav">
          <button id="prevBtn" class="btn btn-secondary" type="button">Back</button>
          <button id="nextBtn" class="btn btn-primary" type="button">Next</button>
        </div>
      </section>

      <section id="previewSection" class="card hidden">
        <div class="preview-actions">
          <h3>Report Preview</h3>
          <div class="button-row">
            <button id="downloadPdfBtn" class="btn btn-primary">Download PDF</button>
            <button id="shareWaBtn" class="btn btn-secondary">Share via WhatsApp</button>
          </div>
        </div>

        <article id="pdfContent" class="pdf-sheet"></article>
      </section>

      <section id="historySection" class="card hidden">
        <div class="history-head">
          <h3>Customer History</h3>
          <input id="searchHistory" type="text" placeholder="Search by customer or phone" />
        </div>
        <div id="historyList"></div>
      </section>
    </main>
  </body>
</html>
